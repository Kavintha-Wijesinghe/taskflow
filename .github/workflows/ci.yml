name: TaskFlow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://taskflow:taskflow_password@localhost:5432/taskflow
      JWT_SECRET: taskflow-ci-secret-that-is-long-enough-for-tests
      FRONTEND_URL: http://localhost:3000
      COOKIE_SECURE: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Use compatible npm version
        run: npm install --global npm@11.6.1 --no-audit --no-fund

      - name: Display npm version
        run: npm --version

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Initialize test database
        working-directory: server
        run: npm run db:init

      - name: Run backend tests
        working-directory: server
        run: npm test

      - name: Build backend
        working-directory: server
        run: npm run build

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend lint
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build